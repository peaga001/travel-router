name: travel_surprise
description: Um álbum digital da nossa viagem surpresa
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.3.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Navigation
  go_router: ^14.2.0

  # Code-generation annotations (runtime)
  freezed_annotation: ^2.4.1
  json_annotation: ^4.9.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0

  # Charts
  fl_chart: ^0.68.0

  # PDF export
  pdf: ^3.11.1
  printing: ^5.13.1

  # Animations
  lottie: ^3.1.2
  rive: ^0.13.7

  # Utilities
  url_launcher: ^6.3.0
  intl: ^0.20.2
  uuid: ^4.4.2
  path_provider: ^2.1.4
  file_picker: ^8.0.0
  share_plus: ^10.0.0

  # UI / fonts
  google_fonts: ^6.2.1

  # Web preview — device frame simulator (active only on kIsWeb && kDebugMode)
  device_preview: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.11
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  hive_generator: ^2.0.1

flutter:
  uses-material-design: true

  assets:
    - assets/data/
    - assets/photos/
    - assets/animations/
